    <a class="logo" href="index.html" aria-label="Ryan Filgas home"><img src="assets/photos/01.jpg" alt="Ryan Filgas"></a>
    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-navigation">Menu</button>
    <nav class="site-nav" id="site-navigation" aria-label="Main navigation">
      <ul>
        <li><details open><summary>Art</summary><ul><li><a href="index.html">Narrative Portraiture</a></li><li><a href="landscape.html">Landscape</a></li><li><a href="arial-silks.html">Aerial Silks</a></li><li><a href="free-flight.html">Free Flight</a></li><li><a href="digital-art.html">Digital Art</a></li></ul></details></li>
        <li><details open><summary>Work</summary><ul><li><a href="editorial-happy-hour.html">Happy Hour</a></li><li><a href="architecture-interior.html">Arch-Interiors</a></li><li><a href="architecture-exterior.html">Arch-Exteriors</a></li></ul></details></li>
        <li><a href="about-me-art.html">About Me (Art)</a></li>
        <li><a href="about-software-engineering.html">About Me (SWE)</a></li>
        <li><a href="connect.html" aria-current="page">Connect</a></li>

      </ul>
    </nav>
    <footer class="site-footer"><a href="mailto:ryan@ryanfilgas.com">Email</a><a href="https://www.linkedin.com/pub/ryan-filgas/7a/650/725">LinkedIn</a><a href="https://github.com/rfilgas">GitHub</a></footer>
  </header>
  <main class="content-page">
    <img src="assets/content/connect.jpg" alt="Ryan Filgas" class="content-hero">
    <h1><a href="mailto:ryan@ryanfilgas.com">ryan@ryanfilgas.com</a></h1>
    <form id="contact-form" class="connect-form">
      <div class="field-group">
        <label for="cf-name">Name</label>
        <input type="text" id="cf-name" name="name" autocomplete="name" required>
      </div>
      <div class="field-group">
        <label for="cf-email">Email</label>
        <input type="email" id="cf-email" name="email" autocomplete="email" required>
      </div>
      <div class="field-group">
        <label for="cf-message">Message</label>
        <textarea id="cf-message" name="message" rows="6" required></textarea>
      </div>
      <button type="submit" class="submit-btn">Send</button>
      <p class="connect-msg" id="cf-msg" aria-live="polite"></p>
    </form>
  </main>
  <script>
    document.querySelector('.menu-toggle').addEventListener('click', function() {
      var open = document.querySelector('.site-nav').classList.toggle('is-open');
      this.setAttribute('aria-expanded', String(open));
    });
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var name = document.getElementById('cf-name').value.trim();
      var email = document.getElementById('cf-email').value.trim();
      var message = document.getElementById('cf-message').value.trim();
      var msg = document.getElementById('cf-msg');
      if (!name || !email || !message) {
        msg.textContent = 'Please fill in all fields.';
        return;
      }
      var subject = encodeURIComponent('Message from ' + name);
      var body = encodeURIComponent('Name: ' + name + '\nEmail: ' + email + '\n\n' + message);
      window.location.href = 'mailto:ryan@ryanfilgas.com?subject=' + subject + '&body=' + body;
    });
  </script>
</body>
</html>
